$font = Maple Mono Normal NL

general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor = 
    path = /home/riley/.config/hypr/hyprpaper/dreamy-blush-serene-pink-landscape-in-minimalist-style-zg-1920x1080.jpg
    blur_passes = 3
    blur_size = 5
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(ffddf4ff)
    check_color = rgba(a6e3a1ff)
    fail_color = rgba(f38ba8ff)
    font_color = rgb(34, 34, 34)
    fade_on_empty = false
    rounding = 4

    font_family = $font
    placeholder_text = haiiii!!!
    fail_text = $PAMFAIL

    dots_text_format = *
    dots_size = 0.4
    dots_spacing = 0.3

    position = 0, 350
    halign = center
    valign = bottom
}

# time
label {
    monitor =
    text = $TIME
    font_size = 100
    font_family = $font

    position = 0, 250
    halign = center
    valign = center
}

# date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 30
    font_family = $font

    position = 0, 150
    halign = center
    valign = center
}
